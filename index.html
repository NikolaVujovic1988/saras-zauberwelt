<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Saras Zauberwelt</title>
<meta name="description" content="Eine Zauberwelt zum Malen, Anziehen, Gärtnern, Zaubern und Kuscheln – für Sara">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sara">
<meta name="theme-color" content="#31215c">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Floating ambient stars (filled by JS) -->
<div id="ambient" aria-hidden="true"></div>

<!-- shared paint servers (must live in a rendered svg, ids referenced across the app) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="regenbogen-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef6461"/><stop offset=".25" stop-color="#f5d76e"/>
      <stop offset=".5" stop-color="#8bc98a"/><stop offset=".75" stop-color="#7ec8e3"/>
      <stop offset="1" stop-color="#9b7ede"/>
    </linearGradient>
    <radialGradient id="glitzer-fill" cx=".35" cy=".3" r="1">
      <stop offset="0" stop-color="#fdf0c2"/><stop offset=".55" stop-color="#f5d76e"/>
      <stop offset="1" stop-color="#d9a441"/>
    </radialGradient>
    <linearGradient id="m-horn" x1="0" y1="1" x2="0.4" y2="0">
      <stop offset="0" stop-color="#f6dd8d"/><stop offset="1" stop-color="#e9b64d"/>
    </linearGradient>
    <linearGradient id="m-mane" x1="0" y1="0" x2="1" y2="1">

    <linearGradient id="m-face" x1="0" y1="0" x2="0" y2="1">

    </linearGradient>
    <linearGradient id="d-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe0c8"/><stop offset="1" stop-color="#f3ceac"/>

    <linearGradient id="d-dress1" x1="0" y1="0" x2="0" y2="1">

    <linearGradient id="d-dress2" x1="0" y1="0" x2="0" y2="1">

      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/><stop offset="1" stop-color="#cfe8ff" stop-opacity=".7"/>
    </linearGradient>
    <linearGradient id="d-hairblond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8dc90"/><stop offset="1" stop-color="#eec163"/>
    </linearGradient>
    <linearGradient id="d-hairbraun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5714a"/><stop offset="1" stop-color="#845234"/>
    </linearGradient>
    <linearGradient id="d-hairrosa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbc0da"/><stop offset="1" stop-color="#ef8fc0"/>
    </linearGradient>
    <linearGradient id="d-hairlila" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9a4f2"/><stop offset="1" stop-color="#9d72d8"/>
    </linearGradient>
    <linearGradient id="f-mane" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#f9a8cf"/><stop offset=".5" stop-color="#d98ae0"/><stop offset="1" stop-color="#9d7bec"/>

</svg>

<!-- ============ HUD (shared) ============ -->
<div id="hud" class="hud">
  <button class="hud-pill hud-sara" data-go="karte" aria-label="Zauberkarte">
    <span class="hud-avatar" aria-hidden="true">
      <img src="icons/sara-avatar.png" alt="" style="width:100%;height:100%;display:block;border-radius:50%;object-fit:cover;object-position:center">
    </span>
    <span class="hud-name">Sara</span>
  </button>
  <div class="hud-right">
    <div class="hud-pill hud-dust" id="hud-dust" aria-label="Feenstaub">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#f5d76e" d="M12 1 l2.6 6.4 6.9 .8 -5.2 4.7 1.4 6.8 -5.7 -3.6 -5.7 3.6 1.4 -6.8 -5.2 -4.7 6.9 -.8 Z"/></svg>
      <span id="dust-count">0</span>
    </div>
    <button class="hud-pill hud-gear" data-go="eltern-gate" aria-label="Eltern-Ecke">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 4c0-.6-.05-1.1-.14-1.6l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-2.7-1.6L15.4 2h-4l-.4 2.8a7.6 7.6 0 0 0-2.7 1.6l-2.4-1-2 3.4 2 1.6c-.08.5-.13 1-.13 1.6s.05 1.1.14 1.6l-2 1.6 2 3.4 2.4-1c.8.7 1.7 1.2 2.7 1.6l.4 2.8h4l.4-2.8c1-.4 1.9-.9 2.7-1.6l2.4 1 2-3.4-2-1.6c.1-.5.14-1 .14-1.6Z"/></svg>
    </button>
  </div>
</div>

<!-- ============ 1 · ZAUBERKARTE ============ -->

      <linearGradient id="karte-rose-cloud" x1="0" y1="0" x2="1" y2="0">

      <circle cx="1038" cy="142" r="3"/>
    </g>
  </svg>
  <div class="karte-titel" aria-hidden="true">
    <span>✦</span> WILLKOMMEN <span>✦</span>
  </div>
  <nav class="karte" id="karte-orbs" aria-label="Spielwelt"></nav>
</main>

<!-- ============ 2 · MAL-ATELIER ============ -->
<section id="screen-malen" class="screen" aria-label="Mal-Atelier">
  <button class="btn-home" data-go="karte" aria-label="Zur Karte">
    <svg viewBox="0 0 48 48"><path d="M8 24 L24 8 L40 24 M13 21 L13 40 L35 40 L35 21" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="malen-kopf" id="malen-tabs" role="tablist" aria-label="Bilder"></div>
  <div class="malen-mitte">
    <div class="canvas-wrap" id="canvas-wrap"></div>
    <aside class="sticker-lade" id="sticker-lade" aria-label="Sticker">
      <p class="lade-titel">Sticker</p>
      <div class="lade-grid" id="sticker-grid"></div>
    </aside>
  </div>
  <div class="palette" id="palette" role="toolbar" aria-label="Farben"></div>
  <button class="btn-round btn-reset" id="btn-reset" aria-label="Neu anfangen">
    <svg viewBox="0 0 48 48"><path d="M38 22 A15 15 0 1 0 36 32" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/><path d="M39 12 L39 23 L28 21" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</section>

<!-- ============ 3 · ANKLEIDEZIMMER ============ -->

        <g id="layer-extra"></g>
      </svg>
    </div>

    <aside class="item-panel">
      <p class="panel-titel" id="panel-titel">Kleider</p>
      <div class="item-grid" id="item-grid"></div>

        </button>

  </div>
  <div class="foto-blitz" id="foto-blitz" aria-hidden="true"></div>
</section>

<!-- ============ 4 · ZAUBERGARTEN ============ -->

<!-- ============ 5 · ZAUBERTURM (Tränke) ============ -->
<section id="screen-trank" class="screen" aria-label="Zauberturm">
  <button class="btn-home" data-go="karte" aria-label="Zur Karte">
    <svg viewBox="0 0 48 48"><path d="M8 24 L24 8 L40 24 M13 21 L13 40 L35 40 L35 21" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="trank-layout">
    <div class="kessel-buehne">
      <div class="trank-slots" id="trank-slots" aria-hidden="true"></div>

<!-- ============ 7 · STICKER-ALBUM ============ -->
<section id="screen-album" class="screen" aria-label="Sticker-Album">
  <button class="btn-home" data-go="karte" aria-label="Zur Karte">
    <svg viewBox="0 0 48 48"><path d="M8 24 L24 8 L40 24 M13 21 L13 40 L35 40 L35 21" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <div class="album-rahmen">
    <p class="album-titel">📖 Mein Album</p>
    <div class="album-layout">
      <div class="album-tabs" id="album-tabs" role="tablist"></div>
      <div class="album-seite" id="album-seite"></div>
    </div>
  </div>
</section>

<!-- ============ 8 · ELTERN-ECKE ============ -->
<section id="screen-eltern-gate" class="screen" aria-label="Eltern-Türe">
  <button class="btn-home" data-go="karte" aria-label="Zur Karte">
    <svg viewBox="0 0 48 48"><path d="M8 24 L24 8 L40 24 M13 21 L13 40 L35 40 L35 21" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="gate-mitte">
    <p class="gate-hinweis">NUR FÜR ERWACHSENE</p>
    <h2 class="gate-titel">Halte den Kreis<br>3 Sekunden gedrückt</h2>
    <button class="gate-kreis" id="gate-kreis" aria-label="3 Sekunden halten">
      <svg class="gate-ring" viewBox="0 0 120 120" aria-hidden="true">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#4b3a72" stroke-width="8"/>
        <circle id="gate-progress" cx="60" cy="60" r="52" fill="none" stroke="#f0c964" stroke-width="8" stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="326.7" transform="rotate(-90 60 60)"/>
      </svg>
      <svg class="gate-schild" viewBox="0 0 24 24" aria-hidden="true"><path fill="#f0c964" d="M12 2 L20 5 v6 c0 5 -3.4 9.4 -8 11 c-4.6 -1.6 -8 -6 -8 -11 V5 Z M10.5 14.5 L7.5 11.5 l1.4 -1.4 l1.6 1.6 l4.6 -4.6 l1.4 1.4 Z"/></svg>
    </button>
    <p class="gate-sub">Loslassen bricht ab</p>
  </div>
</section>

<section id="screen-eltern" class="screen" aria-label="Eltern-Ecke">
  <div class="eltern-kopf">
    <button class="btn-home eltern-zurueck" data-go="karte" aria-label="Zurück">
      <svg viewBox="0 0 48 48"><path d="M30 10 L16 24 L30 38" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h2>Eltern-Ecke</h2>
  </div>
  <div class="eltern-grid">
    <div class="eltern-karte">
      <h3>🔈 Ton & Musik</h3>
      <label class="schalter-zeile"><span>Musik</span><input type="checkbox" id="opt-musik" class="schalter"></label>
      <label class="schalter-zeile"><span>Soundeffekte</span><input type="checkbox" id="opt-sound" class="schalter" checked></label>
    </div>
    <div class="eltern-karte">
      <h3>⭐ Fortschritt</h3>
      <div class="fortschritt" id="eltern-fortschritt"></div>
    </div>
    <div class="eltern-karte">
      <h3>⚙️ Verwaltung</h3>
      <p class="eltern-info">🔒 Keine Käufe, keine Werbung, kein Internet nötig ✓</p>
      <button class="btn-reset-all" id="btn-reset-all">↺ Fortschritt zurücksetzen</button>
    </div>
  </div>
</section>
